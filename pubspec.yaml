name: buxoro_pos
description: "Xposter — restoran/kafe uchun POS tizimi (Flutter + Firebase)."
publish_to: 'none'
version: 1.0.3+4

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  provider: ^6.1.0
  image_picker: ^1.1.2           # mahsulot rasmini galereya/kameradan yuklash
  # ── Real WiFi termal printer (ESC/POS) ──
  network_info_plus: ^5.0.3      # WiFi IP / subnet aniqlash
  esc_pos_utils_plus: ^2.0.4     # ESC/POS chek baytlarini generatsiya qilish
  shared_preferences: ^2.2.2     # topilgan printer IP/qog'oz o'lchamini saqlash
  multicast_dns: ^0.3.2          # mDNS/Bonjour printer discovery (eng ishonchli)
  # ── Firebase backend (Faza 4 — BACKEND-TAYYORGARLIK.md) ──
  firebase_core: ^3.6.0          # Firebase init (firebase_options.dart)
  firebase_auth: ^5.3.1          # Auth (owner email/parol + xodim login)
  cloud_firestore: ^5.4.4        # Firestore (asosiy ma'lumotlar bazasi)
  firebase_messaging: ^15.1.3    # FCM push bildirishnomalar
  firebase_storage: ^12.3.4      # Rasm/fayl (Blaze reja yoqilgach ishlaydi)
  cloud_functions: ^5.1.3        # Callable functions (xodim yaratish, §12.4)

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1   # app ikonkasini (X logo) generatsiya qilish

# App launcher icon — login brendi bilan bir xil (accent kvadrat + oq serif «X»).
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#D97757"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
